<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Orchestra | Porto Alegre</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400&display=swap" rel="stylesheet">
    <style>
        :root { --areia: #F1E4D3; --texto: #3F2E23; }
        body { background-color: var(--areia); color: var(--texto); font-family: 'Inter', sans-serif; margin: 0; padding: 0; display: flex; flex-direction: column; min-height: 100vh; -webkit-font-smoothing: antialiased; }
        nav { padding: 40px; text-align: center; }
        nav a { text-decoration: none; color: var(--texto); margin: 0 20px; text-transform: uppercase; font-size: 0.8rem; letter-spacing: 3px; font-style: normal; transition: opacity 0.3s ease; }
        nav a.active { border-bottom: 1px solid var(--texto); padding-bottom: 5px; font-weight: 600; }
        header { flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; padding: 0 20px; }
        
        .main-logo {
            max-width: 320px; /* Ajuste conforme o peso visual do logo */
            width: 85%;
            height: auto;
            margin-bottom: 20px;
        }

        .subtitle { font-size: 0.75rem; letter-spacing: 6px; opacity: 0.7; text-transform: uppercase; margin: 0; }
    </style>
</head>
<body>
    <nav>
        <a href="index.html" class="active">Home</a>
        <a href="eventos.html">Eventos</a>
    </nav>
    <header>
        <img src="logo.png.svg" alt="Orchestra" class="main-logo">
        <p class="subtitle">Porto Alegre • Gastronomia Mutável</p>
    </header>
</body>
</html>
