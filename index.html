    <style>
        :root { --areia: #F1E4D3; --texto: #3F2E23; }

        nav a { text-decoration: none; color: var(--texto); margin: 0 20px; text-transform: uppercase; font-size: 0.85rem; letter-spacing: 3px; font-weight: 400; transition: opacity 0.3s; }
        nav a:hover { opacity: 0.5; }
        nav a.active { border-bottom: 1px solid var(--texto); padding-bottom: 5px; font-weight: 600; }

        /* Centro */
        header { flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; padding-bottom: 10vh; }
        h1 { font-family: 'Cormorant Garamond', serif; font-size: clamp(3rem, 12vw, 6rem); font-weight: 300; letter-spacing: 20px; text-transform: uppercase; margin: 0; line-height: 1; }
        .subtitle { font-size: 0.75rem; letter-spacing: 8px; opacity: 0.6; margin-top: 30px; text-transform: uppercase; }
    </style>
</head>
