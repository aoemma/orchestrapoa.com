<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Orchestra | Porto Alegre</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400&family=Inter:wght@300;400&display=swap" rel="stylesheet">
    <style>
        /* Definindo as cores do MIV */
        :root {
            --cor-areia: #F2E9E1; 
            --cor-texto: #3F2E23;
        }

        body {
            background-color: var(--cor-areia); /* Fundo areia */
            color: var(--cor-texto); /* Texto marrom escuro */
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 60px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        header {
            text-align: center;
            margin-bottom: 80px;
            width: 100%;
        }

        h1 {
            font-family: 'Cormorant Garamond', serif;
            font-size: 3.5rem;
            font-weight: 300;
            letter-spacing: 10px;
            text-transform: uppercase;
            margin: 0;
            font-style: normal; /* Sem itálico */
        }

        .subtitle {
            font-size: 0.8rem;
            letter-spacing: 4px;
            opacity: 0.7;
            margin-top: 15px;
            font-weight: 400;
        }

        /* Grid das fotos */
        .gallery {
            max-width: 1100px;
            width: 100%;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 25px;
        }

        .gallery-item {
            overflow: hidden;
            background-color: rgba(63, 46, 35, 0.05);
            display: flex;
        }

        .gallery-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            filter: grayscale(10%); /* Toque editorial leve */
            transition: transform 0.8s ease;
        }

        .gallery-item img:hover {
            transform: scale(1.05);
            filter: grayscale(0%);
        }

        /* Deixando algumas fotos maiores para dar ritmo */
        .tall { grid-row: span 2; }
        .wide { grid-column: span 2; }

        footer {
            margin-top: 100px;
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.6rem;
            font-weight: 300;
            font-style: normal; /* Sem itálico */
            letter-spacing: 1px;
        }

        /* Ajuste para celular */
        @media (max-width: 768px) {
            h1 { font-size: 2.2rem; }
            .wide { grid-column: span 1; }
        }
    </style>
</head>
<body>

    <header>
        <h1>Orchestra</h1>
        <p class="subtitle">PORTO ALEGRE • EM BREVE</p>
    </header>

    <main class="gallery">
        <div class="gallery-item tall"><img src="4L8A9815.jpg" alt="Chef"></div>
        <div class="gallery-item"><img src="Custodio + Le Moustache-25.jpg" alt="Pimentões"></div>
        <div class="gallery-item"><img src="4L8A9987.jpg" alt="Sobremesa"></div>
        <div class="gallery-item wide"><img src="Le Moustache + Custodio-262.jpg" alt="Carne"></div>
        <div class="gallery-item"><img src="IMG_5964.jpg" alt="Prato"></div>
        <div class="gallery-item"><img src="4L8A6876.jpg" alt="Mise en place"></div>
    </main>

    <footer>
        A harmonia entre o tempo e o paladar.
    </footer>

</body>
</html>
