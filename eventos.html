<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eventos | Orchestra</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400&family=Inter:wght@300;400&display=swap" rel="stylesheet">
    <style>
        :root { --areia: #F1E4D3; --areia-foto: #E2D1B9; --texto: #3F2E23; }
        body { background-color: var(--areia); color: var(--texto); font-family: 'Inter', sans-serif; margin: 0; -webkit-font-smoothing: antialiased; }
        
        nav { padding: 30px 20px; text-align: center; position: sticky; top: 0; background: var(--areia); z-index: 1000; border-bottom: 1px solid rgba(63,46,35,0.05); }
        .nav-logo { max-width: 140px; height: auto; margin-bottom: 15px; display: block; margin-left: auto; margin-right: auto; }
        nav a { text-decoration: none; color: var(--texto); margin: 0 15px; text-transform: uppercase; font-size: 0.75rem; letter-spacing: 2px; }
        nav a.active { border-bottom: 1px solid var(--texto); padding-bottom: 3px; font-weight: 600; }

        main { max-width: 1200px; margin: 40px auto; padding: 0 20px; }
        h2 { font-family: 'Cormorant Garamond', serif; font-size: 2.2rem; font-weight: 300; text-transform: uppercase; letter-spacing: 8px; text-align: center; margin-bottom: 50px; }

        .gallery { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); 
            gap: 15px; 
        }

        .gallery-item { 
            background-color: var(--areia-foto); 
            aspect-ratio: 1 / 1; 
            overflow: hidden; 
        }

        .gallery-item img { 
            width: 100%; 
            height: 100%; 
            object-fit: cover; 
            display: block; 
            transition: opacity 0.4s ease;
        }

        .gallery-item:hover img { opacity: 0.8; }

        footer { padding: 80px 20px; text-align: center; opacity: 0.5; font-size: 0.7rem; letter-spacing: 2px; }

        @media (max-width: 600px) {
            .gallery { grid-template-columns: repeat(2, 1fr); gap: 10px; }
            h2 { font-size: 1.6rem; letter-spacing: 5px; }
        }
    </style>
</head>
<body>
    <nav>
        <img src="logo.png.svg" alt="Orchestra" class="nav-logo">
        <a href="index.html">Home</a>
        <a href="eventos.html" class="active">Eventos</a>
    </nav>
    <main>
        <h2>Experiências</h2>
        <div class="gallery">
            <div class="gallery-item"><img src="chef.jpg"></div>

            <div class="gallery-item"><img src="tartare.jpg"></div>
            <div class="gallery-item"><img src="bacalhau.jpg"></div>

            <div class="gallery-item"><img src="prime.jpg"></div>
            <div class="gallery-item"><img src="vinho.jpg"></div>

    </main>

</body>
</html>
