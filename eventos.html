<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eventos | Orchestra | Porto Alegre</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400&family=Inter:wght@300;400&display=swap" rel="stylesheet">
    <style>
        :root { --areia: #F1E4D3; --areia-foto: #E2D1B9; --texto: #3F2E23; }
        body { background-color: var(--areia); color: var(--texto); font-family: 'Inter', sans-serif; margin: 0; -webkit-font-smoothing: antialiased; }
        nav { padding: 40px; text-align: center; position: sticky; top: 0; background: var(--areia); z-index: 1000; border-bottom: 1px solid rgba(63,46,35,0.05); }
        nav a { text-decoration: none; color: var(--texto); margin: 0 20px; text-transform: uppercase; font-size: 0.9rem; letter-spacing: 3px; font-weight: 400; font-style: normal; transition: opacity 0.3s ease; }
        nav a:hover { opacity: 0.6; }
        nav a.active { border-bottom: 1px solid var(--texto); padding-bottom: 5px; font-weight: 600; }
        main { max-width: 1400px; margin: 60px auto; padding: 0 40px; }
        h2 { font-family: 'Cormorant Garamond', serif; font-size: 3rem; font-weight: 300; text-transform: uppercase; letter-spacing: 10px; text-align: center; margin-bottom: 80px; font-style: normal; }
        .gallery { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 30px; grid-auto-flow: dense; }
        .gallery-item { background-color: var(--areia-foto); overflow: hidden; position: relative; }
        .gallery-item img { width: 100%; height: 100%; object-fit: cover; display: block; transition: transform 0.8s cubic-bezier(0.165, 0.84, 0.44, 1); }
        .gallery-item:hover img { transform: scale(1.04); }
        
        /* Layout Editorial Classes */
        .tall { grid-row: span 2; aspect-ratio: 2/3; }
        .wide { grid-column: span 2; aspect-ratio: 16/9; }
        .square { aspect-ratio: 1/1; }

        footer { padding: 120px 20px; text-align: center; opacity: 0.5; font-family: 'Cormorant Garamond', serif; font-size: 1.4rem; letter-spacing: 3px; border-top: 1px solid rgba(63,46,35,0.05); }
        
        @media (max-width: 1024px) { .gallery { grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; } }
        @media (max-width: 768px) { 
            main { padding: 0 20px; margin: 40px auto; }
            .wide { grid-column: span 1; aspect-ratio: 1/1; } 
            .tall { grid-row: auto; aspect-ratio: 1/1; }
            h2 { font-size: 2rem; letter-spacing: 6px; }
        }
    </style>
</head>
<body>
    <nav>

    </nav>
