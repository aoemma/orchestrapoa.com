<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eventos | Orchestra</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400&family=Inter:wght@300;400&display=swap" rel="stylesheet">
    <style>
        :root { --areia: #F1E4D3; --areia-foto: #E2D1B9; --texto: #3F2E23; }
        
        body { 
            background-color: var(--areia); 
            color: var(--texto); 
            font-family: 'Inter', sans-serif; 
            margin: 0; 
            -webkit-font-smoothing: antialiased; 
        }
        
        /* Navegação Fixa */
        nav { 
            padding: 40px; 
            text-align: center; 
            position: sticky; 
            top: 0; 
            background: var(--areia); 
            z-index: 1000; 
            border-bottom: 1px solid rgba(63,46,35,0.05); 
        }
        
        nav a { 
            text-decoration: none; 
            color: var(--texto); 
            margin: 0 20px; 
            text-transform: uppercase; 
            font-size: 0.9rem; 
            letter-spacing: 3px; 
            font-weight: 400; 
        }
        
        nav a.active { 
            border-bottom: 1px solid var(--texto); 
            padding-bottom: 5px; 
            font-weight: 600; 
        }

        main { 
            max-width: 1400px; 
            margin: 40px auto; 
            padding: 0 20px; 
        }

        h2 { 
            font-family: 'Cormorant Garamond', serif; 
            font-size: 2.5rem; 
            font-weight: 300; 
            text-transform: uppercase; 
            letter-spacing: 8px; 
            text-align: center; 
            margin-bottom: 60px; 
        }
        
        /* Grid Editorial (Desktop) */
        .gallery { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); 
            gap: 20px; 
            grid-auto-flow: dense; 
        }

        .gallery-item { 
            background-color: var(--areia-foto); 
            overflow: hidden; 
            position: relative; 
        }

        .gallery-item img { 
            width: 100%; 
            height: 100%; 
            object-fit: cover; 
            display: block; 
            transition: transform 0.8s ease; 
        }
        
        .tall { grid-row: span 2; aspect-ratio: 2/3; }
        .wide { grid-column: span 2; aspect-ratio: 16/9; }
        .square { aspect-ratio: 1/1; }

        /* AJUSTE ESPECÍFICO PARA CELULAR */
        @media (max-width: 768px) {
            nav { padding: 20px 10px; }
            nav a { margin: 0 10px; font-size: 0.75rem; letter-spacing: 1px; }
            
            main { margin: 20px auto; padding: 0 10px; }
            h2 { font-size: 1.8rem; letter-spacing: 4px; margin-bottom: 30px; }

            .gallery { 
                grid-template-columns: repeat(2, 1fr); /* Duas colunas no celular */
                gap: 10px; 
            }

            /* No celular, todas as fotos ficam quadradas para alinhar a grade */
            .gallery-item.wide, .gallery-item.tall, .gallery-item.square { 
                grid-column: span 1; 
                grid-row: auto; 
                aspect-ratio: 1 / 1; 
            }
        }
    </style>
</head>
<body>
    <nav>
        <a href="index.html">Home</a>
        <a href="eventos.html" class="active">Eventos</a>
    </nav>
    <main>
        <h2>Experiências</h2>
        <div class="gallery">
            <div class="gallery-item tall"><img src="chef.jpg"></div>
            <div class="gallery-item wide"><img src="pimentoes.jpg"></div>
            <div class="gallery-item square"><img src="sobremesa.jpg"></div>
            <div class="gallery-item square"><img src="entrada.jpg"></div>
            <div class="gallery-item tall"><img src="carne.jpg"></div>
            <div class="gallery-item square"><img src="tomate.jpg"></div>
            <div class="gallery-item tall"><img src="prata.jpg"></div>
            <div class="gallery-item square"><img src="peixe.jpg"></div>
            <div class="gallery-item square"><img src="arroz.jpg"></div>
            <div class="gallery-item wide"><img src="montando.jpg"></div>
            <div class="gallery-item square"><img src="saladapera.jpg"></div>
            <div class="gallery-item square"><img src="maitre.jpg"></div>
            <div class="gallery-item tall"><img src="suspeito.jpg"></div>
            <div class="gallery-item square"><img src="tartare.jpg"></div>
            <div class="gallery-item square"><img src="bacalhau.jpg"></div>
            <div class="gallery-item wide"><img src="mesafarta.jpg"></div>
            <div class="gallery-item square"><img src="tortei.jpg"></div>
            <div class="gallery-item square"><img src="panelas.jpg"></div>
            <div class="gallery-item square"><img src="tomate2.jpg"></div>
            <div class="gallery-item square"><img src="mesabatata.jpg"></div>
            <div class="gallery-item tall"><img src="poulet.jpg"></div>
            <div class="gallery-item square"><img src="salada.jpg"></div>
            <div class="gallery-item square"><img src="buffet.jpg"></div>

</body>
</html>
