<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eventos | Orchestra</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400&family=Inter:wght@300;400&display=swap" rel="stylesheet">
    <style>
        :root { --areia-escuro: #DCCFBF; --areia-claro: #E8D8C3; --texto: #2C1E16; }
        body { background-color: var(--areia-claro); color: var(--texto); font-family: 'Inter', sans-serif; margin: 0; }
        
        nav { padding: 40px; text-align: center; border-bottom: 1px solid rgba(44,30,22,0.1); }
        nav a { text-decoration: none; color: var(--texto); margin: 0 15px; text-transform: uppercase; font-size: 0.8rem; letter-spacing: 2px; }

        .container { max-width: 1200px; margin: 60px auto; padding: 0 20px; }
        h2 { font-family: 'Cormorant Garamond', serif; font-size: 2.5rem; font-weight: 300; text-transform: uppercase; letter-spacing: 5px; margin-bottom: 40px; text-align: center; }

        /* Grid de fotos dos Eventos */
        .gallery { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; }
        .gallery-item { background-color: var(--areia-escuro); overflow: hidden; aspect-ratio: 1/1; }
        .gallery-item img { width: 100%; height: 100%; object-fit: cover; transition: 0.5s; }
        .gallery-item img:hover { transform: scale(1.05); }

        @media (max-width: 768px) { h2 { font-size: 1.8rem; } }
    </style>
</head>
<body>
    <nav>
        <a href="index.html">Home</a>
        <a href="eventos.html">Eventos</a>
    </nav>

    <div class="container">
        <h2>Eventos & Experiências</h2>
        <div class="gallery">
            <div class="gallery-item"><img src="chef.jpg"></div>
            <div class="gallery-item"><img src="pimentoes.jpg"></div>
            <div class="gallery-item"><img src="carne.jpg"></div>
            </div>
    </div>
</body>
</html>
