<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eventos | Orchestra</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400&family=Inter:wght@300;400&display=swap" rel="stylesheet">
    <style>
        :root { --areia: #F1E4D3; --texto: #3F2E23; --areia-foto: #E2D1B9; }
        body { background-color: var(--areia); color: var(--texto); font-family: 'Inter', sans-serif; margin: 0; -webkit-font-smoothing: antialiased; overflow-x: hidden; }
        nav { padding: 30px 10px; text-align: center; position: sticky; top: 0; background: var(--areia); z-index: 100; border-bottom: 1px solid rgba(63,46,35,0.05); }
        nav a { text-decoration: none; color: var(--texto); margin: 0 10px; text-transform: uppercase; font-size: 0.75rem; letter-spacing: 2px; }
        nav a.active { border-bottom: 1px solid var(--texto); padding-bottom: 5px; font-weight: 600; }
        main { max-width: 1400px; margin: 40px auto; padding: 0 15px; }
        h2 { font-family: 'Cormorant Garamond', serif; font-size: clamp(1.8rem, 8vw, 2.5rem); font-weight: 300; text-transform: uppercase; letter-spacing: 6px; text-align: center; margin-bottom: 40px; }
        .gallery { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; grid-auto-flow: dense; }
        @media (min-width: 769px) { .gallery { grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 25px; } .tall { grid-row: span 2; aspect-ratio: 2/3; } .wide { grid-column: span 2; aspect-ratio: 16/9; } }
        .gallery-item { background-color: var(--areia-foto); overflow: hidden; aspect-ratio: 1/1; }
        .gallery-item img { width: 100%; height: 100%; object-fit: cover; display: block; }
    </style>
</head>
