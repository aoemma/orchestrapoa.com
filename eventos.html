<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eventos | Orchestra | Porto Alegre</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        /* MIV Orchestra - Paleta Areia */
        :root {
            --areia-claro: #F1E4D3;
            --areia-escuro: #E2D1B9;
            --texto: #3F2E23;
            --header-font: 'Cormorant Garamond', serif;
            --body-font: 'Inter', sans-serif;
        }

        body {
            background-color: var(--areia-claro);
            color: var(--texto);
            font-family: var(--body-font);
            margin: 0;
            padding: 0;
            -webkit-font-smoothing: antialiased;
        }

        /* Navegação */
        nav {
            background-color: rgba(241, 228, 211, 0.95);
            padding: 25px 0;
            text-align: center;
            border-bottom: 1px solid rgba(63, 46, 35, 0.1);
            position: sticky;
            top: 0;
            z-index: 1000;
        }
        nav ul {
            list-style: none;
            margin: 0;
            padding: 0;
            display: inline-flex;
            gap: 30px;
        }
        nav a {
            text-decoration: none;
            color: var(--texto);
            text-transform: uppercase;
            font-size: 0.85rem;
            letter-spacing: 2px;
            font-weight: 400;
            font-style: normal; /* Sem Itálico conforme manual */
            transition: opacity 0.3s ease;
        }
        nav a:hover, nav a.active {
            opacity: 0.6;
            font-weight: 600;
        }

        /* Conteúdo */
        main {
            max-width: 1400px;
            margin: 80px auto;
            padding: 0 40px;
        }

        h1 {
            font-family: var(--header-font);
            font-size: 3.5rem;
            font-weight: 300;
            text-transform: uppercase;
            letter-spacing: 10px;
            text-align: center;
            margin-bottom: 20px;
            font-style: normal;
        }

        .page-subtitle {
            font-family: var(--body-font);
            font-size: 0.9rem;
            text-align: center;
            text-transform: uppercase;
            letter-spacing: 4px;
            opacity: 0.7;
            margin-bottom: 80px;
        }

        /* Galeria Estilo Editorial */
        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 30px;
            grid-auto-flow: dense;
        }

        .gallery-item {
            background-color: var(--areia-escuro);
            overflow: hidden;
            position: relative;
        }

        .gallery-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            transition: transform 0.6s ease;
        }

        .gallery-item:hover img {
            transform: scale(1.05);
        }

        /* Classes de Destaque */
        .tall { grid-row: span 2; }
        .wide { grid-column: span 2; }

        footer {
            margin-top: 120px;
            padding: 60px 20px;
            text-align: center;
            background-color: var(--areia-escuro);
            font-family: var(--header-font);
            font-size: 1.5rem;
            font-weight: 300;
            letter-spacing: 2px;
            font-style: normal;
        }

        @media (max-width: 768px) {
            .gallery { grid-template-columns: 1fr; }
            .tall, .wide { grid-row: auto; grid-column: auto; }
            h1 { font-size: 2.5rem; }
        }
    </style>
</head>
<body>

    <nav>
        <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="eventos.html" class="active">Eventos</a></li>

            <li><a href="#">Sobre</a></li>
            <li><a href="#">Contato</a></li>

    </nav>

    <main>

        <div class="gallery">
            <div class="gallery-item"><img src="tomate.jpg" alt="Evento Orchestra"></div>
            <div class="gallery-item tall"><img src="prata.jpg" alt="Evento Orchestra"></div>
            <div class="gallery-item"><img src="peixe.jpg" alt="Evento Orchestra"></div>
            <div class="gallery-item"><img src="arroz.jpg" alt="Evento Orchestra"></div>
            <div class="gallery-item wide"><img src="montando.jpg" alt="Evento Orchestra"></div>
            <div class="gallery-item"><img src="saladapera.jpg" alt="Evento Orchestra"></div>
            <div class="gallery-item"><img src="maitre.jpg" alt="Evento Orchestra"></div>
            <div class="gallery-item tall"><img src="suspeito.jpg" alt="Evento Orchestra"></div>
            <div class="gallery-item"><img src="tartare.jpg" alt="Evento Orchestra"></div>
            <div class="gallery-item"><img src="bacalhau.jpg" alt="Evento Orchestra"></div>
            <div class="gallery-item wide"><img src="mesafarta.jpg" alt="Evento Orchestra"></div>
            <div class="gallery-item"><img src="tortei.jpg" alt="Evento Orchestra"></div>
            <div class="gallery-item"><img src="panelas.jpg" alt="Evento Orchestra"></div>
            <div class="gallery-item"><img src="tomate2.jpg" alt="Evento Orchestra"></div>
            <div class="gallery-item"><img src="mesabatata.jpg" alt="Evento Orchestra"></div>
            <div class="gallery-item tall"><img src="poulet.jpg" alt="Evento Orchestra"></div>
            <div class="gallery-item"><img src="salada.jpg" alt="Evento Orchestra"></div>
            <div class="gallery-item"><img src="buffet.jpg" alt="Evento Orchestra"></div>
            <div class="gallery-item"><img src="saladao.jpg" alt="Evento Orchestra"></div>
            <div class="gallery-item"><img src="verrine.jpg" alt="Evento Orchestra"></div>
            <div class="gallery-item tall"><img src="prime.jpg" alt="Evento Orchestra"></div>
            <div class="gallery-item"><img src="vinho.jpg" alt="Evento Orchestra"></div>
            <div class="gallery-item"><img src="mesadrink.jpg" alt="Evento Orchestra"></div>
            <div class="gallery-item wide"><img src="poivre.jpg" alt="Evento Orchestra"></div>
            <div class="gallery-item"><img src="camarao.jpg" alt="Evento Orchestra"></div>

        </div>
    </main>

    <footer>
        Orchestra • Gastronomia Mutável
    </footer>

</body>
</html>
